Problem:
  type: object
  description: |
    Standard error envelope following RFC 7807 (Problem Details for HTTP APIs).
    Every error response in this API uses this shape.
  required: [type, title, status]
  properties:
    type:
      type: string
      format: uri
      description: A URI reference identifying the problem type.
      default: 'about:blank'
    title:
      type: string
      description: Short, human-readable summary of the problem type.
      maxLength: 200
    status:
      type: integer
      description: HTTP status code generated by the origin server.
      minimum: 100
      maximum: 599
    detail:
      type: string
      description: Human-readable explanation specific to this occurrence.
      maxLength: 2000
    instance:
      type: string
      format: uri
      description: URI reference identifying the specific occurrence.

Level:
  type: string
  description: |
    CEFR proficiency level. Drives quest difficulty, target word selection,
    and AI prompt parameterization.
  enum:
    - A1
    - A2
    - B1
    - B2
    - C1
    - C2

HealthStatus:
  type: object
  required: [status]
  properties:
    status:
      type: string
      description: Coarse-grained service state.
      enum: [UP, DOWN]
    version:
      type: string
      description: Backend artifact version, for diagnostics.
      maxLength: 64
